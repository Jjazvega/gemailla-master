name: Continuous Integration

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate app, functions, and rules
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck core application
        run: npm run typecheck:core

      - name: Validate Firebase Functions syntax
        run: npm run lint
        working-directory: functions

      - name: Test Firebase Functions CORS policy
        run: npm run test:functions

      - name: Build production bundle
        run: npm run build

      - name: Test Firebase security rules in emulators
        run: npm run test:rules:emulators
